name: Split Packages

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

env:
  # PAT secret with write access to split repositories.
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  verify-split-repositories:
    runs-on: ubuntu-latest
    steps:
      - name: Verify split repositories exist
        run: |
          set -euo pipefail
          if [ -z "${ACCESS_TOKEN:-}" ]; then
            echo "ACCESS_TOKEN is not configured."
            exit 1
          fi

          repositories=(core cli mcp github gmail linear notion slack)
          missing=()

          for repository in "${repositories[@]}"; do
            status_code="$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/sanvexdev/${repository}")"

            if [ "${status_code}" != "200" ]; then
              missing+=("sanvexdev/${repository} (HTTP ${status_code})")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing or inaccessible split repositories:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

  split:
    needs: verify-split-repositories
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'core'
            split_repository: 'core'
          - local_path: 'cli'
            split_repository: 'cli'
          - local_path: 'mcp'
            split_repository: 'mcp'
          - local_path: 'drivers/github'
            split_repository: 'github'
          - local_path: 'drivers/gmail'
            split_repository: 'gmail'
          - local_path: 'drivers/linear'
            split_repository: 'linear'
          - local_path: 'drivers/notion'
            split_repository: 'notion'
          - local_path: 'drivers/slack'
            split_repository: 'slack'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - if: "!startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.0
        with:
          access_token: ${{ env.ACCESS_TOKEN }}
          package_directory: '${{ matrix.package.local_path }}'
          repository_organization: 'sanvexdev'
          repository_name: '${{ matrix.package.split_repository }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - if: "startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.0
        with:
          access_token: ${{ env.ACCESS_TOKEN }}
          tag: ${{ github.ref_name }}
          package_directory: '${{ matrix.package.local_path }}'
          repository_organization: 'sanvexdev'
          repository_name: '${{ matrix.package.split_repository }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
